workflows:
  android-build:
    name: MaceyRunners Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.maceyrunners.app"
        NODE_VERSION: "20.x" # Matches modern Expo 50+ requirements
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform android
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com # <-- Change to your email

  ios-build:
    name: MaceyRunners iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.maceyrunners.app"
        XCODE_SCHEME: "MaceyRunners"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/$XCODE_SCHEME.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
