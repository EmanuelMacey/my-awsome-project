ios-build:
    name: MaceyRunners iOS Build
    integrations:
      app_store_connect: "MaceyRunnersKey" # This MUST match the name from Step 1
    environment:
      ios_signing:
        distribution_type: app_store 
        bundle_identifier: com.maceyrunners.app
      vars:
        XCODE_SCHEME: "MaceyRunners"
    scripts:
      - name: Install dependencies
        script: npm install && cd ios && pod install
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios
      - name: Set up code signing
        script: xcode-project use-profiles # Automatically handles the export-options.plist
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/$XCODE_SCHEME.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
